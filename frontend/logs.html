<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Activity Journal — DMS Monitor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/style.css" />
  <style>
    :root {
      --bg-darker: #05080f;
      --content-max-width: 1100px;
    }

    body {
      background: var(--bg-darker);
      margin: 0;
      padding: 0;
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .app-header {
      position: sticky;
      top: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 32px;
      height: 72px;
      background: rgba(13, 20, 34, 0.9);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--glass-border);
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .logo-icon img {
      height: 48px;
      width: auto;
    }

    .header-titles h1 {
      font-size: 1.1rem;
      font-weight: 700;
      margin: 0;
    }

    .header-subtitle {
      font-size: 0.72rem;
      color: var(--text-muted);
    }

    .main-canvas {
      flex: 1;
      width: 100%;
      max-width: var(--content-max-width);
      margin: 0 auto;
      padding: 40px 20px;
    }

    .section-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      margin-bottom: 30px;
    }

    .section-title h2 {
      font-size: 1.8rem;
      font-weight: 800;
      margin-bottom: 6px;
    }

    .section-title span {
      font-size: 0.85rem;
      color: var(--text-muted);
    }

    .logs-container {
      background: rgba(13, 20, 34, 0.4);
      border: 1px solid var(--glass-border);
      border-radius: 16px;
      overflow: hidden;
      min-height: 400px;
    }

    .log-header {
      display: grid;
      grid-template-columns: 180px 220px 100px 1fr;
      padding: 15px 25px;
      background: rgba(255,255,255,0.03);
      border-bottom: 1px solid var(--glass-border);
      font-size: 0.7rem;
      font-weight: 800;
      text-transform: uppercase;
      color: var(--accent);
      letter-spacing: 0.05em;
    }

    .logs-list {
      max-height: 700px;
      overflow-y: auto;
    }

    .log-item {
      display: grid;
      grid-template-columns: 180px 220px 100px 1fr;
      padding: 14px 25px;
      font-size: 0.85rem;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      align-items: center;
      transition: background 0.2s;
    }

    .log-item:hover { background: rgba(255,255,255,0.02); }
    .log-time { color: var(--text-muted); font-family: monospace; font-size: 0.78rem; }
    .log-cat { font-weight: 700; color: var(--accent); font-size: 0.72rem; text-transform: uppercase; }
    .log-inst { font-weight: 600; color: var(--text-secondary); text-align: center; background: rgba(255,255,255,0.05); padding: 2px 8px; border-radius: 6px; width: fit-content; }
    .log-msg { color: var(--text-primary); }

    /* Category-based coloring */
    .log-item.cat-status { border-left: 4px solid #4ade80; }
    .log-item.cat-status .log-msg { color: #4ade80; }

    .log-item.cat-admin { border-left: 4px solid #fbbf24; }
    .log-item.cat-admin .log-msg { color: #fbbf24; }

    .log-item.cat-auth { border-left: 4px solid #ffffff; }
    .log-item.cat-auth .log-msg { color: #ffffff; }

    .log-item.cat-system { border-left: 4px solid #3b82f6; }
    .log-item.cat-system .log-msg { color: #3b82f6; }

    .filters-row {
      display: flex;
      gap: 15px;
      margin-bottom: 25px;
    }

    select, input {
      background: rgba(0,0,0,0.3);
      border: 1px solid var(--glass-border);
      border-radius: 10px;
      padding: 10px 15px;
      color: #fff;
      font-size: 0.85rem;
    }

    .btn-refresh {
      background: var(--accent);
      border: none;
      border-radius: 10px;
      color: #fff;
      padding: 10px 20px;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .btn-refresh:hover { filter: brightness(1.2); }
  </style>
</head>
<body>
  <header class="app-header">
    <div class="header-left">
      <div class="logo-icon">
        <img src="/static/logo-header.png" alt="DMS">
      </div>
      <div class="header-titles">
        <h1>DMS Instance Monitor</h1>
        <span class="header-subtitle">Activity Journal</span>
      </div>
    </div>
    <div class="header-right">
      <a href="/manager" class="nav-btn">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
          <line x1="9" y1="3" x2="9" y2="21"></line>
        </svg>
        Manager
      </a>
      <a href="/" class="nav-btn">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M3 12l9-9 9 9M5 10v10a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V10"></path>
        </svg>
        Dashboard
      </a>
    </div>
  </header>

  <main class="main-canvas">
    <div class="section-header">
      <div class="section-title">
        <h2>Activity Journal</h2>
        <span>Consolidated logs from all monitored DMS instances</span>
      </div>
      <button class="btn-refresh" id="btnRefresh">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
          <path d="M23 4v6h-6"></path>
          <path d="M1 20v-6h6"></path>
          <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path>
        </svg>
        Refresh
      </button>
      <button class="btn-refresh" id="btnClearLogs" style="background: #ff5f5f; font-size: 0.75rem;">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="3 6 5 6 21 6"></polyline>
          <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
        </svg>
        Clear Journal
      </button>
    </div>

    <div class="filters-row">
      <select id="filterInstance">
        <option value="">All Instances</option>
        <!-- Populate via JS -->
      </select>
      <select id="filterLimit">
        <option value="100">Last 100 entries</option>
        <option value="500">Last 500 entries</option>
        <option value="1000">Last 1000 entries</option>
      </select>
    </div>

    <div class="logs-container">
      <div class="log-header">
        <span>Timestamp</span>
        <span>Instance & Assigned To</span>
        <span>Category</span>
        <span>Event Message</span>
      </div>
      <div class="logs-list" id="logsList">
        <div style="padding: 40px; text-align: center; color: var(--text-muted);">
          Loading logs...
        </div>
      </div>
    </div>
  </main>

  <footer class="app-footer" style="margin-top: auto; justify-content: center; padding: 20px;">
    <span class="footer-copy">©2026 Sportdata Gmbh & Co KG — Activity Monitoring</span>
  </footer>

  <script src="/static/logs.js"></script>
</body>
</html>
