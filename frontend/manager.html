<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Instance Manager — DMS Monitor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/style.css" />
  <style>
    :root {
      --bg-darker: #05080f;
      --content-max-width: 1100px;
    }

    body {
      background: var(--bg-darker);
      margin: 0;
      padding: 0;
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow-y: auto; /* Fix 1: Enable scrolling */
    }

    /* ═══ HEADER (Replaced Sidebar) ═════════════════════════════════════════ */
    .app-header {
      position: sticky;
      top: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 32px;
      height: 72px;
      background: rgba(13, 20, 34, 0.9);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--glass-border);
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .logo-icon img {
      height: 48px;
      width: auto;
    }

    .header-titles h1 {
      font-size: 1.1rem;
      font-weight: 700;
      margin: 0;
    }

    .header-subtitle {
      font-size: 0.72rem;
      color: var(--text-muted);
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 16px;
    }


    /* ═══ MAIN CONTENT ═════════════════════════════════════════════════════ */
    .main-canvas {
      flex: 1;
      width: 100%;
      max-width: var(--content-max-width); /* Fix 3: Reduce width */
      margin: 0 auto;
      padding: 40px 20px;
    }

    .section-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      margin-bottom: 30px;
    }

    .section-title h2 {
      font-size: 1.8rem;
      font-weight: 800;
      margin-bottom: 6px;
    }

    .section-title span {
      font-size: 0.85rem;
      color: var(--text-muted);
    }

    /* Search area */
    .search-row {
      margin-bottom: 30px;
    }

    .search-input-wrapper {
      position: relative;
      max-width: 400px;
    }

    .search-input-wrapper input {
      width: 100%;
      background: rgba(0,0,0,0.3);
      border: 1px solid var(--glass-border);
      border-radius: 12px;
      padding: 12px 15px 12px 42px;
      color: #fff;
      font-size: 0.9rem;
    }

    .search-icon {
      position: absolute;
      left: 15px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
    }

    /* Table Head & Rows */
    .table-head {
      display: grid;
      grid-template-columns: 80px 100px 1.5fr 1.2fr 180px;
      padding: 0 25px;
      margin-bottom: 15px;
    }

    .table-head span {
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      color: var(--accent);
      letter-spacing: 0.1em;
    }

    .instances-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .instance-row {
      display: grid;
      grid-template-columns: 80px 100px 1.5fr 1.2fr 180px;
      align-items: center;
      padding: 16px 25px;
      background: var(--bg-card);
      border: 1px solid var(--glass-border);
      border-radius: 14px;
      transition: all 0.2s;
    }

    .instance-row:hover {
      background: var(--bg-card-hover);
      transform: scale(1.01);
    }

    .instance-row.available { border-left: 4px solid var(--available); }
    .instance-row.in_use { border-left: 4px solid var(--in-use); }
    .instance-row.maintenance { border-left: 4px solid var(--maintenance); }

    .row-id { font-size: 0.8rem; color: var(--text-muted); font-family: monospace; }
    .row-port { font-weight: 800; font-size: 1.1rem; }
    .row-url { font-size: 0.9rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .row-internal { color: var(--text-muted); font-size: 0.82rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;}

    /* Actions */
    .row-actions { display: flex; gap: 15px; justify-content: flex-end; }
    
    .btn-action {
      background: transparent;
      border: none;
      color: var(--text-secondary);
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      font-weight: 600;
      font-size: 0.82rem;
      transition: 0.2s;
    }

    .btn-action svg { width: 14px; height: 14px; }
    .action-edit:hover { color: var(--available); }
    .action-delete:hover { color: var(--in-use); }

    /* Modal Styling */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(4, 7, 12, 0.8);
      backdrop-filter: blur(15px);
      z-index: 200;
      display: none;
      align-items: center;
      justify-content: center;
    }

    .modal-overlay.active { display: flex; }

    .modal-pane {
      background: #0d1422;
      border: 1px solid var(--glass-border);
      border-radius: 20px;
      width: 100%;
      max-width: 480px;
      padding: 35px;
      box-shadow: 0 40px 80px rgba(0, 0, 0, 0.6);
      position: relative;
    }

    /* Status Pill interactive */
    .status-pill.clickable {
      cursor: pointer;
      transition: transform 0.2s, filter 0.2s;
    }
    .status-pill.clickable:hover {
      transform: scale(1.05);
      filter: brightness(1.2);
    }

    .test-btn {
      padding: 6px 12px;
      font-size: 0.72rem;
      font-weight: 700;
      border-radius: 8px;
      border: 1px solid var(--glass-border);
      background: var(--glass-bg);
      color: var(--text-secondary);
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: all 0.2s;
    }

    .test-btn:hover {
      background: var(--accent-dim);
      color: var(--accent);
      border-color: var(--accent);
    }

    .test-btn.success { background: var(--available-dim); border-color: var(--available); color: var(--available); }
    .test-btn.error { background: var(--in-use-dim); border-color: var(--in-use); color: var(--in-use); }

    .spinner-box {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.5);
      border-radius: inherit;
      display: none;
      align-items: center;
      justify-content: center;
    }

    /* ═══ LOGS SECTION ═════════════════════════════════════════════════════ */
    .logs-section {
      margin-top: 60px;
      padding-top: 40px;
      border-top: 1px solid var(--glass-border);
    }

    .logs-container {
      background: rgba(13, 20, 34, 0.4);
      border: 1px solid var(--glass-border);
      border-radius: 16px;
      overflow: hidden;
      max-height: 500px;
      overflow-y: auto;
    }

    .log-item {
      display: grid;
      grid-template-columns: 160px 100px 80px 1fr;
      padding: 12px 20px;
      font-size: 0.82rem;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      align-items: center;
    }

    .log-item:last-child { border-bottom: none; }
    .log-item:hover { background: rgba(255,255,255,0.02); }

    .log-time { color: var(--text-muted); font-family: monospace; font-size: 0.75rem; }
    .log-cat { font-weight: 700; color: var(--accent); font-size: 0.7rem; text-transform: uppercase; }
    .log-inst { font-weight: 600; color: var(--text-secondary); text-align: center; background: rgba(255,255,255,0.05); padding: 2px 6px; border-radius: 4px; width: fit-content; }
    .log-msg { color: var(--text-primary); }

    .log-item.error .log-msg { color: #ff5f5f; }
    .log-item.success .log-msg { color: #4ade80; }
    .log-item.warning .log-msg { color: #fbbf24; }
    
    .log-item.error { border-left: 3px solid #ff5f5f; }
    .log-item.success { border-left: 3px solid #4ade80; }
    .log-item.warning { border-left: 3px solid #fbbf24; }
  </style>
</head>

<body>
  <header class="app-header">
    <div class="header-left">
      <div class="logo-icon">
        <img src="/static/logo-header.png" alt="DMS">
      </div>
      <div class="header-titles">
        <h1>DMS Instance Manager</h1>
        <span class="header-subtitle">Administrative Control Panel</span>
      </div>
    </div>
    <div class="header-right">
      <a href="/logs" class="nav-btn">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path>
          <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path>
        </svg>
        Activity Journal
      </a>
      <a href="/" class="nav-btn">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M3 12l9-9 9 9M5 10v10a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V10"></path>
        </svg>
        Dashboard
      </a>
    </div>
  </header>

  <main class="main-canvas">
    <div class="section-header">
      <div class="section-title">
        <h2>Server Registry</h2>
        <span id="instanceCounter">Loading instances...</span>
      </div>
      <button class="btn btn-primary" id="btnAddInstance">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
          <line x1="12" y1="5" x2="12" y2="19"></line>
          <line x1="5" y1="12" x2="19" y2="12"></line>
        </svg>
        Add Instance
      </button>
    </div>

    <div class="search-row">
      <div class="search-input-wrapper">
        <svg class="search-icon" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"></circle>
          <path d="M21 21l-4.35-4.35"></path>
        </svg>
        <input type="text" placeholder="Search ports or URLs..." id="searchInput">
      </div>
    </div>

    <div class="table-head">
      <span>ID</span>
      <span>Port</span>
      <span>Public URL</span>
      <span>Internal URL</span>
      <span style="text-align: right;">Actions</span>
    </div>

    <div class="instances-list" id="tableBody">
      <!-- Injected via manager.js -->
    </div>
  </main>

  <footer class="app-footer" style="margin-top: auto; justify-content: center; padding: 20px;">
    <span class="footer-copy">©2026 Sportdata Gmbh & Co KG — DMS Instance Monitor V4.0</span>
  </footer>

  <!-- MODAL -->
  <div class="modal-overlay" id="instanceModal">
    <div class="modal-pane">
      <h3 id="modalTitle" style="color: var(--accent); margin-bottom: 25px;">Create Instance</h3>
      
      <form id="instanceForm">
        <input type="hidden" id="instanceId" />
        <div class="form-group" style="margin-bottom: 16px;">
          <label>Network Port</label>
          <input type="text" id="port" required placeholder="9110">
        </div>
        <div class="form-group" style="margin-bottom: 16px;">
          <label>Public Access URL</label>
          <div style="display: flex; gap: 8px;">
            <input type="url" id="url" required placeholder="https://dms.sportdata.org:9110" style="margin-bottom:0;">
            <button type="button" class="test-btn" id="btnTestPublic">Test</button>
          </div>
        </div>
        <div class="form-group" style="margin-bottom: 25px;">
          <label>Internal Docker URL</label>
          <div style="display: flex; gap: 8px;">
            <input type="text" id="internal_url" placeholder="http://dms-9110:80" style="margin-bottom:0;">
            <button type="button" class="test-btn" id="btnTestInternal">Test</button>
          </div>
        </div>
        
        <div style="display: flex; gap: 12px;">
          <button type="button" class="btn btn-ghost" id="modalCancel" style="flex: 1;">Cancel</button>
          <button type="submit" class="btn btn-primary" style="flex: 2; background: var(--accent); border: none;">Save Changes</button>
        </div>
      </form>

      <div id="loadingIndicator" class="spinner-box">
        <div class="spinner"></div>
      </div>
    </div>
  </div>

  <script src="/static/manager.js"></script>
</body>

</html>
